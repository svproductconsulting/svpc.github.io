- name: Aeroport AI
  image: img/aeroportai.jpg
  category: Aviation Tech
  description: >
    AI-powered airside operations platform that uses computer vision
    and deep learning to optimize aircraft turnaround times, detect
    apron risks, and monitor ground handling in real time.

- name: Autometrics
  image: img/autometrics.jpg
  category: Manufacturing AI
  description: >
    Intelligent process monitoring for advanced manufacturing.
    The X-Sigma platform uses dual-scale AI/ML to detect
    quality deviations in real time on the shop floor, reducing
    scrap and rework for welding and additive manufacturing.

- name: BetterCart Analytics
  image: img/bettercartanalytics.jpg
  category: Grocery Intelligence
  description: >
    Canada's largest grocery price database, providing price
    analytics, promotion tracking, and assortment insights
    to help CPG companies and retailers make data-driven
    pricing and competitive strategy decisions.

- name: DeepSight
  image: img/deepsight.jpg
  category: Industrial AR / AI
  description: >
    AI and augmented reality platform for frontline knowledge
    transfer in manufacturing. Captures tribal knowledge from
    experts, turns it into interactive AR training guides, and
    reduces onboarding time by up to 60%.

- name: Asenion (formerly Fairly AI)
  image: img/fairlyai.jpg
  category: AI Governance
  description: >
    End-to-end AI governance, risk, and compliance platform.
    Helps enterprises manage AI security and legal risks,
    achieve audit readiness for EU AI Act and ISO 42001,
    and deploy AI safely. Named a major player in the IDC
    MarketScape for AI Governance Platforms.

- name: FormicAI
  image: img/formicai.jpg
  category: Explainable AI
  description: >
    Trustworthy, explainable AI for regulated and high-security
    sectors. Their engine provides sentence-level citations to
    source documents, multimodal semantic search across millions
    of files, and secure on-premise deployment for legal,
    government, and finance use cases.

- name: Genie AI Now
  image: img/genieainow.jpg
