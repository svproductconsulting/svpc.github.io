  description: >
    AI-powered patient communication and scheduling platform
    for Canadian clinics. Automates 24/7 call answering,
    intelligent appointment booking, and front-office workflows
    with deep PMS integrations like ClearDent and OSCAR Pro.

- name: Glyph Platforms
  image: img/glyphplatforms.jpg
